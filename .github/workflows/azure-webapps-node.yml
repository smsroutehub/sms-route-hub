<!DOCTYPE html>
<html>
<head>
<title>Global SMS Route Exchange</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#f4f6fb;color:#111;}
header{background:#0a1f44;color:white;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
.logo{font-size:22px;font-weight:bold;}
nav ul{list-style:none;margin:0;padding:0;display:flex;align-items:center;}
nav ul li{margin-left:25px;position:relative;}
nav ul li a{color:white;font-weight:500;}
nav ul li a:hover{color:#60a5fa;}
.menu-toggle{display:none;font-size:24px;cursor:pointer;}
nav ul li ul{position:absolute;top:35px;left:0;background:#0a1f44;padding:10px 0;display:none;min-width:150px;border-radius:6px;}
nav ul li:hover ul{display:block;}
nav ul li ul li a{display:block;padding:8px 20px;color:white;}
.hero{background:linear-gradient(135deg,#0a1f44,#1d4ed8);color:white;text-align:center;padding:120px 30px;}
.hero h1{font-size:42px;margin-bottom:10px;}
.section{padding:70px 40px;}
.section h2{text-align:center;margin-bottom:40px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px;}
.stat{background:white;padding:30px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center;}
.stat h3{color:#2563eb;margin:0;}
.search, .filters{text-align:center;margin-bottom:25px;}
.search input, .filters select{padding:12px;width:200px;border-radius:6px;border:1px solid #ccc;margin:5px;}
table{width:100%;border-collapse:collapse;background:white;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
th{background:#0a1f44;color:white;padding:12px;cursor:pointer;}
td{padding:10px;text-align:center;border-bottom:1px solid #eee;}
.price{color:#16a34a;font-weight:bold;}
.status-online{color:#16a34a;font-weight:bold;}
.status-maint{color:#f59e0b;font-weight:bold;}
.paygrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-bottom:40px;}
.card{background:white;padding:30px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center;}
button{background:#2563eb;border:none;color:white;padding:12px 20px;border-radius:6px;cursor:pointer;}
button:hover{background:#1d4ed8;}
.smpp{background:white;padding:30px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:700px;margin:auto;}
footer{background:#0a1f44;color:white;text-align:center;padding:25px;margin-top:60px;}
@media(max-width:768px){
nav ul{display:none;flex-direction:column;position:absolute;top:60px;right:0;background:#0a1f44;width:200px;}
nav ul.active{display:flex;}
nav ul li{margin:0;}
.menu-toggle{display:block;color:white;}
}
</style>
</head>
<body>

<header>
<div class="logo">SMS Route Hub</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav>
<ul id="nav-menu">
<li><a href="#routes">Routes</a></li>
<li><a href="#stats">Stats</a></li>
<li><a href="#access">Access</a></li>
<li><a href="#smpp">SMPP</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<h1>Global SMS Wholesale Routes</h1>
<p>Direct and wholesale SMS termination across 200+ countries</p>
</section>

<section class="section" id="stats">
<h2>Network Statistics</h2>
<div class="stats">
