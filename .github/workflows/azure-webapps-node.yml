<input type="text" id="search" placeholder="Search country..." onkeyup="filterRoutes()">
<select id="continent" onchange="filterRoutes()">
<option value="all">All Continents</option>
<option value="Africa">Africa</option>
<option value="Asia">Asia</option>
<option value="Europe">Europe</option>
<option value="North America">North America</option>
<option value="South America">South America</option>
</select>
</div>

<table id="routesTable">
<tr>
<th>Country</th>
<th>Operator</th>
<th>Route Type</th>
<th onclick="sortPrice()">Price/SMS ↑↓</th>
<th>Status</th>
</tr>
</table>
</section>

<section class="section" id="access">
<h2>Route Access Fees</h2>
<div class="paygrid">
<div class="card"><h3>Africa Routes</h3><h2>200 USDT</h2><a href="https://nexapay.pythonanywhere.com/pay/pay_801924c2483d"><button>Pay Access</button></a></div>
<div class="card"><h3>Asia Routes</h3><h2>400 USDT</h2><a href="https://nexapay.pythonanywhere.com/pay/pay_87c09b4230db"><button>Pay Access</button></a></div>
<div class="card"><h3>Europe Routes</h3><h2>600 USDT</h2><a href="https://nexapay.pythonanywhere.com/pay/pay_df13a1408bb3"><button>Pay Access</button></a></div>
<div class="card"><h3>North America</h3><h2>800 USDT</h2><a href="https://nexapay.pythonanywhere.com/pay/pay_e3774898cb05"><button>Pay Access</button></a></div>
<div class="card"><h3>Global Access</h3><h2>1000 USDT</h2><a href="https://nexapay.pythonanywhere.com/pay/pay_1f61efc4d61b"><button>Pay Access</button></a></div>
</div>
</section>

<section class="section" id="smpp">
<h2>SMPP Connection</h2>
<div class="smpp">
<p><b>Host:</b> smpp.smsroutehub.com</p>
<p><b>Port:</b> 2775</p>
<p><b>Bind:</b> Transceiver</p>
<p><b>Throughput:</b> 150–500 SMS/sec</p>
<p>Credentials issued after payment confirmation.</p>
</div>
</section>

<section class="section" id="why-us">
<h2>Why Choose SMS Route Hub</h2>
<p style="text-align:center;max-width:800px;margin:auto;font-size:16px;line-height:1.6;">
SMS Route Hub is the premier global SMS traffic provider trusted by operators and businesses across 200+ countries. With years of experience in wholesale and A2P messaging, we deliver unmatched network reliability, high delivery rates, and transparent pricing. Our clients work with us because we provide direct access to premium routes, expert support, and a seamless SMPP connection. <strong>Route access is a one-time fee—pay once and gain continuous access to our entire network without recurring charges.</strong> Join industry leaders who rely on our network for secure, scalable, and fast SMS delivery worldwide.
</p>
</section>

<section class="section" id="contact">
<h2>NOC Support</h2>
<p style="text-align:center">Telegram: @smsroutehub44<br><br>Email: smsroutehub@gmail.com</p>
<br>Tel: +447888382883</p>
</section>

<footer>© 2026 Global SMS Route Exchange</footer>

<script>
// Mobile menu toggle
function toggleMenu(){document.getElementById('nav-menu').classList.toggle('active');}

// Routes data with updated attractive low price per SMS
const routeData=[
{country:"United States",continent:"North America",price:"$0.010"},
{country:"Canada",continent:"North America",price:"$0.009"},
{country:"Brazil",continent:"South America",price:"$0.009"},
{country:"Mexico",continent:"North America",price:"$0.006"},
{country:"Argentina",continent:"South America",price:"$0.008"},
{country:"United Kingdom",continent:"Europe",price:"$0.006"},
{country:"Germany",continent:"Europe",price:"$0.006"},
{country:"France",continent:"Europe",price:"$0.007"},
{country:"Spain",continent:"Europe",price:"$0.006"},
{country:"Italy",continent:"Europe",price:"$0.007"},
{country:"Netherlands",continent:"Europe",price:"$0.007"},
{country:"Sweden",continent:"Europe",price:"$0.008"},
{country:"Norway",continent:"Europe",price:"$0.008"},
{country:"Denmark",continent:"Europe",price:"$0.008"},
{country:"Poland",continent:"Europe",price:"$0.007"},
{country:"Turkey",continent:"Europe",price:"$0.007"},
{country:"Russia",continent:"Europe",price:"$0.007"},
{country:"Ukraine",continent:"Europe",price:"$0.006"},
{country:"India",continent:"Asia",price:"$0.002"},
{country:"China",continent:"Asia",price:"$0.005"},
{country:"Japan",continent:"Asia",price:"$0.007"},
{country:"South Korea",continent:"Asia",price:"$0.006"},
{country:"Singapore",continent:"Asia",price:"$0.008"},
{country:"Malaysia",continent:"Asia",price:"$0.005"},
{country:"Thailand",continent:"Asia",price:"$0.006"},
{country:"Indonesia",continent:"Asia",price:"$0.007"},
{country:"Philippines",continent:"Asia",price:"$0.006"},
{country:"Vietnam",continent:"Asia",price:"$0.006"},
{country:"Pakistan",continent:"Asia",price:"$0.005"},
{country:"Bangladesh",continent:"Asia",price:"$0.004"},
{country:"UAE",continent:"Asia",price:"$0.006"},
{country:"Saudi Arabia",continent:"Asia",price:"$0.007"},
{country:"Israel",continent:"Asia",price:"$0.008"},
{country:"South Africa",continent:"Africa",price:"$0.012"},
{country:"Nigeria",continent:"Africa",price:"$0.015"},
{country:"Kenya",continent:"Africa",price:"$0.009"},
{country:"Egypt",continent:"Africa",price:"$0.010"},
{country:"Ghana",continent:"Africa",price:"$0.012"},
{country:"Morocco",continent:"Africa",price:"$0.011"},
{country:"Algeria",continent:"Africa",price:"$0.010"}
];

// Populate table
let table=document.getElementById("routesTable");
routeData.forEach(r=>{
let status=Math.random()>0.1?'<span class="status-online">Online</span>':'<span class="status-maint">High daily volume</span>';
let row=`<tr data-continent="${r.continent}">
<td>${r.country}</td>
<td>Multiple Operators</td>
<td>A2P / Wholesale</td>
<td class="price">${r.price}</td>
<td>${status}</td>
</tr>`;
table.innerHTML+=row;
});

// Filter function
function filterRoutes(){
let input=document.getElementById("search").value.toLowerCase();
let cont=document.getElementById("continent").value;
document.querySelectorAll("#routesTable tr").forEach((row,i)=>{
if(i===0)return;
let country=row.cells[0].innerText.toLowerCase();
let rowCont=row.getAttribute("data-continent");
row.style.display=(country.includes(input)&&(cont==="all"||rowCont===cont))?"":"none";
});
}

// Sort by price
let asc=true;
function sortPrice(){
let rows=[...document.querySelectorAll("#routesTable tr")].slice(1);
rows.sort((a,b)=>{
let pa=parseFloat(a.cells[3].innerText.replace("$",""));
let pb=parseFloat(b.cells[3].innerText.replace("$",""));
return asc?pa-pb:pb-pa;
});
rows.forEach(r=>table.appendChild(r));
asc=!asc;
}
</script>

</body>
</html>
